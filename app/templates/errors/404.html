{% extends 'base.html' %}

{% block content %}
<style>
  .error-page {
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .error-code {
    font-size: 8rem;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .error-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1e293b;
    margin: 12px 0 8px;
  }
  .error-desc {
    color: #64748b;
    font-size: 1rem;
    max-width: 420px;
    margin-bottom: 28px;
  }
  .error-icon {
    font-size: 4rem;
    margin-bottom: 12px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }
</style>
<div class="error-page">
  <div class="error-icon">🔍</div>
  <div class="error-code">404</div>
  <div class="error-title">Page Not Found</div>
  <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('main.index') }}" class="btn btn-primary px-4 py-2">← Back to Home</a>
</div>
{% endblock %}
