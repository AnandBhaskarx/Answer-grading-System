{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-header bg-success text-white text-center">
                <h4>Sign Up</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.signup') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">I am a:</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                    </div>
                    
                    <div class="mb-3" id="enrollment-group">
                        <label for="enrollment_number" class="form-label">Enrollment Number (Students only)</label>
                        <input type="text" class="form-control" id="enrollment_number" name="enrollment_number" placeholder="e.g. STU12345">
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success">Create Account</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('role').addEventListener('change', function() {
        const group = document.getElementById('enrollment-group');
        if (this.value === 'student') {
            group.style.display = 'block';
        } else {
            group.style.display = 'none';
        }
    });
</script>
{% endblock %}
